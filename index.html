<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AeroRail — Smart Railway Reservations</title>
  <meta name="description" content="Book train tickets, check PNR status, and track live train locations with AeroRail — India's smartest railway reservation platform.">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>function initGoogleAuth(){ window.dispatchEvent(new Event('google-api-loaded')); }</script>
  <script src="https://accounts.google.com/gsi/client?onload=initGoogleAuth" async defer></script>
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="/" class="logo" onclick="route(event)">
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="10" fill="url(#lg)"/>
          <path d="M8 22 L18 10 L28 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 26 H26" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00E5FF"/><stop offset="1" stop-color="#1a237e"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">Aero<span>Rail</span></span>
      </a>

      <nav class="nav-links">
        <a href="/" class="nav-link" onclick="route(event)" id="navHome">Home</a>
        <a href="/pnr" class="nav-link" onclick="route(event)" id="navPNR">PNR Status</a>
        <a href="/tracking" class="nav-link" onclick="route(event)" id="navTracking">Live Tracking</a>
      </nav>

      <div class="nav-actions" id="navActions">
        <!-- Injected by auth.js -->
        <div class="lang-selector"></div>
        <button class="btn btn-primary" onclick="showAuthModal()">Login</button>
      </div>
    </div>
  </header>

  <!-- ── MAIN CONTENT AREA (SPA) ── -->
  <main id="app">
    <!-- Content injected by modular JS -->
  </main>

  <!-- ── AUTH MODAL ── -->
  <div class="modal" id="authModal" onclick="handleModalBackdropClick(event)">
    <div class="modal-card" id="authModalCard">
      <button class="modal-close" onclick="hideAuthModal()">✕</button>
      <div class="modal-header">
        <div class="modal-icon">🚆</div>
        <h2 id="modalTitle">Welcome Back</h2>
        <p id="modalDesc">Sign in to access bookings and your profile.</p>
      </div>
      <form id="authForm" onsubmit="handleAuth(event)">
        <div class="field-group">
          <label>Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="authUsername" class="rounded-input with-icon" placeholder="e.g. sagar_rail" required autocomplete="username"/>
          </div>
        </div>
        <div class="field-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="authPassword" class="rounded-input with-icon" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="pill-btn pill-btn-primary" id="authSubmitBtn" style="width:100%; padding:14px; margin-top:8px;">Continue</button>
        <p class="modal-toggle-text">
          Don't have an account? <a href="#" onclick="toggleAuthMode(event)" id="authToggleLink">Register</a>
        </p>
      </form>
      <div class="modal-divider"><span>OR</span></div>
      <div id="googleAuthButton" style="display:flex; justify-content:center;"></div>
    </div>
  </div>

  <!-- ── BOOKING MODAL ── -->
  <div class="modal" id="bookingModal">
    <div class="modal-content" id="bookingModalContent"></div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <a href="/" class="logo" onclick="route(event)">
        <span class="logo-text" style="font-size:1.1rem;">Aero<span>Rail</span></span>
      </a>
      <p>© 2026 AeroRail. India's smartest train platform.</p>
      <div class="footer-links">
        <a href="#" class="nav-link">Privacy</a>
        <a href="#" class="nav-link">Terms</a>
        <a href="#" class="nav-link">Contact</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/main.js?v=2.0"></script>
</body>
</html>
