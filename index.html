<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AeroRail — Smart Railway Reservations</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="/" class="logo" onclick="route(event)">
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="10" fill="url(#lg)"/>
          <path d="M8 22 L18 10 L28 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 26 H26" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00E5FF"/><stop offset="1" stop-color="#1a237e"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">Aero<span>Rail</span></span>
      </a>

      <nav class="nav-links">
        <a href="/" class="nav-link" onclick="route(event)">Home</a>
        <a href="/pnr" class="nav-link" onclick="route(event)">PNR Status</a>
        <a href="/tracking" class="nav-link" onclick="route(event)">Live Tracking</a>
      </nav>

      <div class="nav-actions" id="navActions">
        <!-- Dynamic Login/Profile Button -->
        <button class="btn btn-primary" onclick="showAuthModal()">Login</button>
      </div>
    </div>
  </header>

  <!-- ── MAIN CONTENT AREA (SPA) ── -->
  <main id="app">
    <!-- Content injected by app.js -->
  </main>

  <!-- ── MODALS ── -->
  <div class="modal" id="authModal">
    <div class="modal-content" style="max-width: 400px; padding: 40px;">
       <h2 id="modalTitle">Welcome Back</h2>
       <p style="color: var(--text-muted); margin-bottom: 24px;">Login to access bookings and profiles.</p>
       <form id="authForm" onsubmit="handleAuth(event)">
         <div class="field-group" style="margin-bottom: 20px;">
           <label>Username</label>
           <div class="input-wrapper">
             <input type="text" id="authUsername" placeholder="e.g. sagar_rail" required/>
           </div>
         </div>
         <div class="field-group" style="margin-bottom: 24px;">
           <label>Password</label>
           <div class="input-wrapper">
             <input type="password" id="authPassword" placeholder="••••••••" required/>
           </div>
         </div>
         <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Continue</button>
         <p style="text-align: center; margin-top: 20px; font-size: 0.875rem;">
           Don't have an account? <a href="#" onclick="toggleAuthMode(event)">Register</a>
         </p>
       </form>
       <button class="btn" style="position: absolute; top: 20px; right: 20px; padding: 10px;" onclick="hideAuthModal()">✕</button>
    </div>
  </div>

  <div class="modal" id="bookingModal">
    <div class="modal-content" id="bookingModalContent">
      <!-- Injected by app.js -->
    </div>
  </div>

  <!-- ── TOAST NOTIFICATIONS ── -->
  <div id="toast" class="glass" style="position: fixed; bottom: 40px; right: 40px; padding: 16px 24px; border-radius: 8px; color: white; display: none; z-index: 3000;"></div>

  <!-- ── FOOTER ── -->
  <footer style="padding: 60px 0; background: #fff; border-top: 1px solid #eee; margin-top: 100px;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <span class="logo-text sm">Aero<span>Rail</span></span>
      <p style="color: var(--text-muted); font-size: 0.875rem;">© 2026 AeroRail. India's smartest train tracking platform.</p>
      <div style="display: flex; gap: 20px;">
        <a href="#" class="nav-link">Privacy</a>
        <a href="#" class="nav-link">Terms</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
